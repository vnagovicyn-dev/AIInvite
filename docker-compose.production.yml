services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - backend

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    command:
      - /bin/sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
    networks:
      - backend

networks:
  backend:

volumes:
  caddy_data:
  caddy_config:
  redis_data:
