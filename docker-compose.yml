services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: postgresql://aiinvite:aiinvite@db:5432/aiinvite_dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aiinvite_dev
      POSTGRES_USER: aiinvite
      POSTGRES_PASSWORD: aiinvite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiinvite -d aiinvite_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - aiinvite_pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  aiinvite_pgdata:
